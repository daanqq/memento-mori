<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark light">
    <title>Memento Mori Wallpaper</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="wallpaper" id="wallpaperRoot">
      <div class="wallpaper__grid" aria-hidden="true"></div>
      <section class="hero" aria-label="Countdown">
        <div class="hero__number" id="countdownValue">0</div>
        <div class="hero__unit" id="countdownUnit">DAYS</div>
      </section>
      <footer class="meta" id="metaLine">
        <div class="meta__line" id="targetLine">TARGET 2089-04-17 12:00:00</div>
      </footer>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
